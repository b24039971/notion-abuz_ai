name: 1. Auto-Validate and Merge Jules PRs

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, labeled, ready_for_review]

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: jules-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  classify-pr:
    runs-on: ubuntu-latest
    outputs:
      autonomous: ${{ steps.classify.outputs.autonomous }}

    steps:
      - uses: actions/checkout@v5

      - name: Classify autonomous PR
        id: classify
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_USER: ${{ github.event.pull_request.user.login }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail
          autonomous="$(python3 .github/scripts/classify-autonomous-pr.py)"
          echo "autonomous=${autonomous}" >> "$GITHUB_OUTPUT"
          echo "Autonomous PR: ${autonomous}"

      - name: Ensure jules label
        if: steps.classify.outputs.autonomous == 'true'
        env:
          GITHUB_API_TOKEN: ${{ secrets.PAT || github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          curl -fsS \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_API_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/labels" \
            -d '{"name":"jules","color":"7057ff","description":"Autonomous Jules PR"}' \
            >/dev/null || true

          curl -fsS \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_API_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/labels" \
            -d '{"labels":["jules"]}' \
            >/dev/null

  test-and-merge:
    needs: classify-pr
    runs-on: ubuntu-latest
    environment: live-rdsh
    if: >
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'no-automerge') &&
      !contains(github.event.pull_request.labels.*.name, 'human-review') &&
      needs.classify-pr.outputs.autonomous == 'true'
    env:
      LIVE_NOTION_ACCOUNTS_B64: ${{ secrets.LIVE_NOTION_ACCOUNTS_B64 }}
      SMOKE_MODEL: ${{ vars.LIVE_SMOKE_MODEL || 'opus-4.8' }}
      SMOKE_PORT: "31081"
      SMOKE_API_KEY: "local-live-smoke-key"

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch PR refs for quality gate
        id: quality-refs
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          base_ref="refs/remotes/origin/${PR_BASE_REF}"
          head_ref="refs/remotes/pull/${PR_NUMBER}/head"

          git fetch --no-tags origin "+refs/heads/${PR_BASE_REF}:${base_ref}"
          git fetch --no-tags origin "+refs/pull/${PR_NUMBER}/head:${head_ref}"

          echo "base_ref=${base_ref}" >> "$GITHUB_OUTPUT"
          echo "head_ref=${head_ref}" >> "$GITHUB_OUTPUT"

      - name: Reject protected runtime and workflow paths
        run: |
          set -euo pipefail
          git diff --name-only \
            "${{ steps.quality-refs.outputs.base_ref }}" \
            "${{ steps.quality-refs.outputs.head_ref }}" \
            | tee /tmp/pr-files.txt
          if grep -E '(^|/)(config\.yaml|token\.txt|pass\.txt|.*\.log|.*\.(orig|rej|diff|patch)|notion-manager(\.exe)?$)$|^(data|accounts)/|^(my_.*\.go|run_test\.go)$|^((plan|scratch|tmp|jules-notes)[a-zA-Z0-9_-]*|pr[-_]?body[a-zA-Z0-9_-]*|pull[-_]?request[-_]?body[a-zA-Z0-9_-]*)\.(md|txt)$' /tmp/pr-files.txt; then
            echo "::error::PR changes protected runtime, secret, binary, log, data, account, workflow, or temporary scratch files."
            exit 1
          fi

      - name: Review autonomous PR quality
        id: quality
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
        run: |
          set -euo pipefail

          printf '%s' "${PR_BODY}" > /tmp/pr-body.md
          python3 .github/scripts/review-autonomous-pr-quality.py \
            --base "${{ steps.quality-refs.outputs.base_ref }}" \
            --head "${{ steps.quality-refs.outputs.head_ref }}" \
            --pr-title "${PR_TITLE}" \
            --pr-body-file /tmp/pr-body.md \
            --report /tmp/autonomous-pr-quality.md \
            --allow-evidence-autofill \
            --autofill-evidence-file /tmp/autonomous-autofill-evidence.md \
            --github-output "$GITHUB_OUTPUT" \
            --json | tee /tmp/autonomous-pr-quality.json

      - name: Persist synthesized evidence in PR body
        if: steps.quality.outputs.passed == 'true' && steps.quality.outputs.evidence_autofill == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT || github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          current_body="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json body --jq '.body // ""')"
          if printf '%s' "$current_body" | grep -q 'AUTONOMOUS_TASK_EVIDENCE'; then
            echo "PR body already contains AUTONOMOUS_TASK_EVIDENCE; skipping synthesized evidence update."
            exit 0
          fi

          {
            printf '%s\n\n' "$current_body"
            cat /tmp/autonomous-autofill-evidence.md
          } > /tmp/pr-body-with-autofill-evidence.md

          jq -n --rawfile body /tmp/pr-body-with-autofill-evidence.md '{body: $body}' \
            > /tmp/pr-body-with-autofill-evidence.json

          gh api \
            -X PATCH \
            "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" \
            --input /tmp/pr-body-with-autofill-evidence.json \
            >/dev/null

          echo "Persisted synthesized AUTONOMOUS_TASK_EVIDENCE in PR body."

      - name: Stop weak autonomous PR before merge
        if: steps.quality.outputs.passed != 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT || github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          QUALITY_SUMMARY: ${{ steps.quality.outputs.summary }}
        run: |
          set -euo pipefail

          gh label create needs-quality-fix \
            --repo "$GITHUB_REPOSITORY" \
            --color d93f0b \
            --description "Autonomous PR needs stronger task completion evidence" \
            >/dev/null 2>&1 || true

          gh pr edit "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --add-label needs-quality-fix

          comments_file="/tmp/pr-comments.json"
          gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" > "$comments_file"

          python3 .github/scripts/update-quality-fix-comment.py \
            --comments "$comments_file" \
            --report /tmp/autonomous-pr-quality.md \
            --pr-number "$PR_NUMBER" \
            --head-sha "$PR_HEAD_SHA" \
            --summary "$QUALITY_SUMMARY" \
            --output-body /tmp/autonomous-quality-fix-request.md \
            --github-output "$GITHUB_OUTPUT"

          comment_id="$(grep '^comment_id=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)"
          jq -Rs '{body: .}' /tmp/autonomous-quality-fix-request.md > /tmp/autonomous-quality-fix-request.json

          if [ -n "${comment_id:-}" ]; then
            gh api \
              -X PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" \
              --input /tmp/autonomous-quality-fix-request.json \
              >/dev/null
            echo "Updated existing autonomous quality-fix request comment ${comment_id}."
          else
            gh api \
              -X POST \
              "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --input /tmp/autonomous-quality-fix-request.json \
              >/dev/null
            echo "Created autonomous quality-fix request comment."
          fi

          dispatch_body="$(jq -n '{
            ref: "master",
            inputs: {
              mode: "act",
              health_mode: "enforce"
            }
          }')"

          gh api \
            -X POST \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/jules_recovery_router.yml/dispatches" \
            --input <(printf '%s' "$dispatch_body") \
            >/dev/null
          echo "Dispatched Jules Recovery Router for immediate quality-fix recovery."

          echo "::error::Autonomous PR quality gate failed: ${{ steps.quality.outputs.summary }}"
          exit 1

      - name: Clear resolved quality-fix label
        if: steps.quality.outputs.passed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          has_quality_label="$(gh pr view "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json labels \
            --jq 'any(.labels[].name; . == "needs-quality-fix")')"

          if [ "$has_quality_label" = "true" ]; then
            gh pr edit "$PR_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --remove-label needs-quality-fix \
              || echo "::warning::Could not remove resolved needs-quality-fix label."
          else
            echo "PR does not have needs-quality-fix; nothing to clear."
          fi

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate autonomous task manifest
        run: python3 scripts/validate_agent_tasks.py agent_tasks.json

      - name: Check Go formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            printf 'gofmt required for:\n%s\n' "$files"
            exit 1
          fi

      - name: Build dashboard
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Refresh embedded dashboard
        run: |
          rm -rf internal/web/dist
          cp -r web/dist internal/web/dist

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Build binary
        run: go build -ldflags="-s -w" -o notion-manager ./cmd/notion-manager

      - name: RDSH local live smoke
        run: bash .github/scripts/rdsh-local-live-smoke.sh

      - name: Merge PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --squash --delete-branch
