name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate autonomous task manifest
        run: |
          python3 scripts/validate_agent_tasks_test.py
          python3 scripts/validate_agent_tasks.py agent_tasks.json

      - name: Validate autonomous task selector
        run: |
          python3 scripts/select_agent_task_test.py
          python3 scripts/select_agent_task.py --manifest agent_tasks.json --risk-ceiling medium --focus proxy --json

      - name: Validate Jules recovery scripts
        run: |
          python3 .github/scripts/count-autonomous-prs-test.py
          python3 .github/scripts/filter-active-jules-sessions-test.py
          python3 .github/scripts/jules_recovery_prompt_test.py
          python3 .github/scripts/collect_failed_pr_context_test.py
          python3 .github/scripts/jules-unattended-monitor-test.py
          python3 .github/scripts/summarize-jules-activities-test.py
          python3 .github/scripts/summarize-jules-failures-test.py
          python3 .github/scripts/block-failed-agent-task-test.py
          python3 .github/scripts/create-circuit-breaker-followup-task-pr-test.py
          python3 .github/scripts/jules-recovery-router-test.py
          python3 .github/scripts/update-quality-fix-comment-test.py
          python3 .github/scripts/classify-autonomous-pr-test.py
          python3 .github/scripts/automation-meta-automerge-workflow-test.py
          python3 .github/scripts/jules-next-task-workflow-test.py
          python3 -m py_compile .github/scripts/count-autonomous-prs.py .github/scripts/filter-active-jules-sessions.py .github/scripts/jules_recovery_prompt.py .github/scripts/summarize-jules-activities.py .github/scripts/summarize-jules-failures.py .github/scripts/block-failed-agent-task.py .github/scripts/create-circuit-breaker-followup-task-pr.py .github/scripts/jules-recovery-router.py .github/scripts/update-quality-fix-comment.py .github/scripts/classify-autonomous-pr.py
          bash -n .github/scripts/jules-unattended-monitor.sh

      - name: Validate automation health report
        run: |
          python3 .github/scripts/automation-health-report-test.py
          python3 .github/scripts/create-automation-meta-task-pr-test.py
          python3 -m py_compile .github/scripts/automation-health-report.py .github/scripts/create-automation-meta-task-pr.py

      - name: Validate autonomous PR quality gate
        run: |
          python3 .github/scripts/review-autonomous-pr-quality-test.py
          python3 .github/scripts/advisory-critic-review-test.py
          python3 -m py_compile .github/scripts/review-autonomous-pr-quality.py .github/scripts/advisory-critic-review.py
          bash -n .github/scripts/rdsh-local-live-smoke.sh

      - name: Check Go formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            printf 'gofmt required for:\n%s\n' "$files"
            exit 1
          fi

      - name: Build dashboard
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Refresh embedded dashboard
        run: |
          rm -rf internal/web/dist
          cp -r web/dist internal/web/dist

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Build binary
        run: go build -ldflags="-s -w" -o notion-manager ./cmd/notion-manager
