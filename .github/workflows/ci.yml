name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Check Go formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Build dashboard
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Refresh embedded dashboard
        run: |
          rm -rf internal/web/dist
          cp -r web/dist internal/web/dist

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Build binary
        run: go build -ldflags="-s -w" -o notion-manager ./cmd/notion-manager
